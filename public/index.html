<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Chat App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <div class="auth-container" id="auth">
      <div class="auth-card">
        <h1><i class="fas fa-comments"></i> Chat App</h1>
        <div class="auth-tabs">
          <button class="tab active" onclick="showLogin()">Login</button>
          <button class="tab" onclick="showRegister()">Register</button>
        </div>
        <form id="loginForm" class="auth-form">
          <input type="text" id="loginUsername" placeholder="Username" required>
          <input type="password" id="loginPassword" placeholder="Password" required>
          <button type="submit">Login</button>
        </form>
        <form id="registerForm" class="auth-form hidden">
          <input type="text" id="registerUsername" placeholder="Username" required>
          <input type="password" id="registerPassword" placeholder="Password" required>
          <button type="submit">Register</button>
        </form>
        <div id="authError" class="error"></div>
      </div>
    </div>

    <div class="chat-container hidden" id="chat">
      <div class="sidebar">
        <div class="user-info">
          <i class="fas fa-user-circle"></i>
          <span id="currentUser"></span>
        </div>
        <div class="rooms">
          <h3>Rooms</h3>
          <ul id="roomList"></ul>
        </div>
        <div class="online-users">
          <h3>Online</h3>
          <ul id="onlineList"></ul>
        </div>
      </div>
      <div class="chat-main">
        <div class="chat-header">
          <h2 id="currentRoom">General</h2>
          <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="message-input">
          <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
          <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
